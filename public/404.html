<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Spindle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script>
    (function() {
      var mq = window.matchMedia('(prefers-color-scheme: dark)');
      document.documentElement.dataset.theme = mq.matches ? 'dark' : 'light';
      mq.addEventListener('change', function(e) {
        document.documentElement.dataset.theme = e.matches ? 'dark' : 'light';
      });
    })();
  </script>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cstyle%3E.s%7Bfill:none;stroke-width:7;stroke-linecap:round;stroke:%23000%7D.f%7Bfill:%23000;stroke:none%7D%40media (prefers-color-scheme:dark)%7B.s%7Bstroke:%23f0f0f0%7D.f%7Bfill:%23f0f0f0%7D%7D%3C/style%3E%3Cpath class='s' d='M 78 22 C 78 12, 60 8, 44 12 C 28 16, 22 28, 32 38 C 40 46, 60 46, 60 46'/%3E%3Cpath class='s' d='M 22 78 C 22 88, 40 92, 56 88 C 72 84, 78 72, 68 62 C 60 54, 40 54, 40 54'/%3E%3Cpath class='f' d='M 50 6 L 51.6 50 L 48.4 50 Z'/%3E%3Crect class='f' x='48.6' y='50' width='2.8' height='40'/%3E%3Cellipse class='f' cx='50' cy='92' rx='9' ry='1.8'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .shell {
      text-align: center;
      padding: 40px 32px;
    }
    .code {
      font-size: 72px;
      font-weight: 600;
      color: var(--fg-bright);
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 16px;
    }
    .label {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--fg-dim);
      margin-bottom: 32px;
    }
    .label .slash {
      color: var(--fg-dimmer);
      margin-right: 6px;
    }
    .msg {
      font-size: 13px;
      color: var(--fg-dim);
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .back {
      display: inline-block;
      font-size: 12px;
      color: var(--fg-dim);
      text-decoration: none;
      border: 1px solid var(--line-2);
      padding: 8px 16px;
      transition: color 0.15s, border-color 0.15s;
    }
    .back:hover {
      color: var(--fg-bright);
      border-color: var(--fg-dim);
    }
  </style>
</head>
<body>
<div class="shell">
  <div class="code">404</div>
  <div class="label"><span class="slash">//</span>page not found</div>
  <div class="msg">The path you requested does not exist.</div>
  <a class="back" href="/inbox">[ go to inbox ]</a>
</div>
</body>
</html>
